# Small smoke test that exercises ALL four prompt variants + primed-trait
# sampling, with cheap models. Use to verify the pipeline end-to-end before
# launching the full 100-rep config (gsa_first_impression_v1.yaml).
#
# 5 personas × 2 reps × 3 models × 4 variants = 120 trials, ≈$0.02.

name: smoke_gsa_full
seed: 42
measure: gsa
task: first_impression
models:
  - anthropic/claude-haiku-4.5
  - openai/gpt-4o-mini
  - google/gemini-2.5-flash
repetitions: 2
budget_usd: 5.0
concurrency: 4
generation_params:
  max_tokens: 400
  temperature: 0.7
task_params:
  variants: [plain, three_traits, reinforcing, challenging]
  primed_traits_n: 3
  # Use a 5-persona subset so the smoke is fast.
  personas:
    - {name: Michael, gender: male,   age: 30}
    - {name: Sarah,   gender: female, age: 30}
    - {name: Daniel,  gender: male,   age: 28}
    - {name: Emily,   gender: female, age: 27}
    - {name: James,   gender: male,   age: 32}
